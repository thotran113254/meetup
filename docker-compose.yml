services:
  postgres:
    image: postgres:16-alpine
    container_name: meetup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetup
      POSTGRES_PASSWORD: meetup2026
      POSTGRES_DB: meetup_cms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
